<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="../static/css/styles.css">
    <title>Comments for Book</title>
</head>
<body>
<div class="topnav">
    <a th:href="@{/books}" href="#" th:text="#{books}">Books</a>
    <a th:href="@{/authors}" href="#" th:text="#{authors}">Authors</a>
    <a th:href="@{/genres}" href="#" th:text="#{genres}">Genres</a>
</div>
<div class="comments-container">
    <div th:if="${#lists.size(comments) > 0}">
    <table class="comments">
        <caption th:text="#{comments-for-book} + ${book.title}">Comments for book</caption>
        <thead>
        <tr>
            <th th:text="#{id}">ID</th>
            <th th:text="#{comment-text}">Text</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${comments}">
            <td th:text="${c.id}">1</td>
            <td th:text="${c.text}">Comment text</td>
            <td></td>
        </tr>
        </tbody>
    </table>
</div>
    <div th:if="${#lists.size(comments) == 0}" class="empty-comments">
        <h2 th:text="#{comments-for-book} + ${book.title}">Comments for book</h2>
        <div class="empty-comments-icon">💬</div>
        <h3 th:text="#{no-comments-title}">No comments</h3>
    </div>
</div>
</body>
</html>
