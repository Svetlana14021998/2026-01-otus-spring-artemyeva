<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="../static/css/styles.css">
    <title>All authors</title>
</head>
<body>
<div class="topnav">
    <a th:href="@{/books}" href="#" th:text="#{books}">Books</a>
    <a th:href="@{/authors}" href="#" th:text="#{authors}">Authors</a>
    <a th:href="@{/genres}" href="#" th:text="#{genres}">Genres</a>
</div>


<div class="genres-container">
<table class="genres">
    <caption th:text="#{genres-lest}">Genres</caption>
    <thead>
    <tr>
        <th th:text="#{id}">ID</th>
        <th th:text="#{genre_name}">Name</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="g : ${genres}">
        <td th:text="${g.id}">1</td>
        <td th:text="${g.name}">Genre</td>
        <td></td>
    </tr>
    </tbody>
</table>
</div>
</body>
</html>
