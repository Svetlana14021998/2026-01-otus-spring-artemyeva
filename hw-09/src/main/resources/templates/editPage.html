<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/editStyle.css}" href="../static/css/editStyle.css">
    <title>Edit book</title>
</head>
<body>
<div class="topnav">
    <a th:href="@{/books}" href="#" th:text="#{books}">Books</a>
    <a th:href="@{/authors}" href="#" th:text="#{authors}">Authors</a>
    <a th:href="@{/genres}" href="#" th:text="#{genres}">Genres</a>
</div>
<form id="edit-form" action="editPage.html" th:action="@{/books/edit(id=${book.id})}" th:method="post" th:object="${book}">
    <h3 th:text = "#{change-book}">Book:</h3>

    <div>
        <label for="id-input" th:text="#{id} + ':'">ID:</label>
        <input id="id-input" type="text" readonly="readonly" name="id" th:value="*{id}" value="1"/>
    </div>

    <div>
        <label for="title-input" th:text="#{title} + ':'">Title:</label>
        <input id="title-input" name="title" type="text" th:value="*{title}" value="Book Title"/>
        <div class="errors" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Wrong book title</div>
    </div>

    <div>
        <label for="author-select" th:text="#{author} + ':'">Author:</label>
        <select id="author-select" th:field="*{author.id}">
            <option th:each="a : ${authors}"
                    th:value="${a.id}"
                    th:text="${a.fullName}">
            </option>
        </select>
    </div>

    <div>
        <label for="genre-select" th:text="#{genres} + ':'">Genres:</label>
        <select id="genre-select" name="genreIds" multiple>
            <option th:each="g : ${genres}"
                    th:value="${g.id}"
                    th:text="${g.name}"
                    th:selected="${book.genres != null && book.genres.![id].contains(g.id)}">
            </option>
        </select>
        <div class="errors" th:if="${#fields.hasErrors('genres')}" th:errors="*{genres}"></div>
    </div>

    <div class="row">
        <button type="submit" th:text="#{save-button}">Save</button>
        <a href="allBooks.html" th:href="@{/}"><button type="button" th:text="#{cancel-button}">Cancel</button></a>
    </div>
</form>

</body>
</html>
