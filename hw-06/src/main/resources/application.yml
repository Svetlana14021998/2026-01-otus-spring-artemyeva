spring:
  datasource:
    url: jdbc:h2:mem:maindb
    show-sql: true
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: never
  h2:
    console:
      path: /h2-console
      settings:
        web-allow-others: true
  flyway:
    enabled: true
    clean-on-validation-error: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG