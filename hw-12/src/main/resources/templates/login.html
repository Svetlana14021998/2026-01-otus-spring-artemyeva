<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">

    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <title th:text="#{login.title}">Login</title>
</head>
<body>
<div class="full-page-bg">
    <div class="topnav">
        <div class="topnav-links">
            <a th:href="@{/main}" href="#" th:text="#{main}">Books</a>
            <a th:href="@{/books}" href="#" th:text="#{books}">Books</a>
            <a th:href="@{/authors}" href="#" th:text="#{authors}">Authors</a>
            <a th:href="@{/genres}" href="#" th:text="#{genres}">Genres</a>
        </div>
        <div class="topnav-lang">
            <a th:href="@{/register(lang=en)}" class="lang-link" title="English">
                <span class="fi fi-gb"></span>
            </a>
            <a th:href="@{/register(lang=ru)}" class="lang-link" title="Русский">
                <span class="fi fi-ru"></span>
            </a>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <h1 th:text="#{enter}">Login</h1>

            <div th:if="${param.error}" class="error-message">
                <span th:text="#{login_error}">Invalid username or password</span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username" th:text="#{username}">Username</label>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="Enter username">
                </div>

                <div class="form-group">
                    <label for="password" th:text="#{password}">Password</label>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Enter password">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-login" th:text="#{login}">Login</button>
                </div>
            </form>

            <div class="auth-footer">
                <span th:text="#{no_account}">Don't have an account?</span>
                <a th:href="@{/register}" th:text="#{register}">Register</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
