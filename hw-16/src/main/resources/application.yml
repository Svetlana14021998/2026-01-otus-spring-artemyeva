spring:
  messages:
    encoding: UTF-8
  datasource:
    url: jdbc:h2:mem:maindb
    show-sql: true
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  flyway:
    enabled: true
    clean-on-validation-error: false
  data:
    rest:
      basePath: /datarest

management:
  endpoints:
    web:
      base-path: "/application-check"
      exposure:
        include: "flyway, health,metrics,logfile"
  endpoint:
    health:
      show-details: when-authorized
      roles: ADMIN
    shutdown:
      enabled: true
  health:
    defaults:
      enabled: true

logging:
  file:
    name: ./logs/library.log